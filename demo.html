<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rich Editor Demo</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { margin-bottom: 20px; }
    form { margin-top: 20px; }
    button[type="submit"] { margin-top: 10px; padding: 8px 20px; }
    .output { margin-top: 20px; padding: 10px; background: #f5f5f5; border: 1px solid #ddd; white-space: pre-wrap; font-family: monospace; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Rich Editor Demo</h1>

  <form id="demoForm">
    <textarea id="editor1" name="content" rows="10" cols="80"><h2>Hello World</h2><p>This is a <strong>rich text</strong> editor with <em>zero dependencies</em>.</p><ul><li>Bold, italic, underline</li><li>Lists and alignment</li><li>Links, images, tables</li><li>Code view and fullscreen</li></ul></textarea>

    <br>
    <button type="submit">Submit (check console)</button>
    <button type="button" onclick="showContent()">Get Content</button>
  </form>

  <div class="output" id="output" style="display:none"></div>

  <script src="dist/rich-editor.umd.js"></script>
  <script>
    RichEditor.init({
      selector: '#editor1',
      height: 400
    });

    function showContent() {
      const html = RichEditor.get('editor1').getContent();
      document.getElementById('output').style.display = 'block';
      document.getElementById('output').textContent = html;
    }

    document.getElementById('demoForm').addEventListener('submit', function(e) {
      e.preventDefault();
      RichEditor.triggerSave();
      console.log('Textarea value:', document.getElementById('editor1').value);
      alert('Content saved to textarea. Check console.');
    });
  </script>
</body>
</html>
